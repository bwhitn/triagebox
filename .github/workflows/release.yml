name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 360

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Ensure sbin directories are on PATH
        run: |
          echo /usr/local/sbin >> "${GITHUB_PATH}"
          echo /usr/sbin >> "${GITHUB_PATH}"
          echo /sbin >> "${GITHUB_PATH}"

      - name: Ensure Rust wasm target
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup default stable
            rustup target add wasm32-unknown-unknown
          else
            echo "rustup not found; install the wasm32-unknown-unknown target manually on the runner" >&2
            exit 1
          fi

      - name: Ensure ext2 filesystem tools
        run: |
          missing=0
          for cmd in e2fsck mke2fs resize2fs; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              missing=1
              break
            fi
          done
          if [ "${missing}" -eq 0 ]; then
            exit 0
          fi
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "Missing ext2 tools and apt-get is unavailable; install e2fsprogs manually on the runner" >&2
            exit 1
          fi
          if ! command -v sudo >/dev/null 2>&1; then
            echo "Missing ext2 tools and sudo is unavailable; install e2fsprogs manually on the runner" >&2
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Verify tag matches VERSION
        if: github.event_name == 'push'
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
            echo "Tag/version mismatch: VERSION=${VERSION}, tag=${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Check runner dependencies
        env:
          CHECK_V86_MIN: "1"
        run: ./scripts/check-build-deps.sh

      - name: Build release bundle
        env:
          EXPECTED_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
          BUILDROOT_CCACHE: "0"
        run: ./scripts/package-release.sh

      - name: Upload release bundle artifact
        if: always() && hashFiles('dist/*.tar.gz', 'dist/*.tar.gz.sha256') != ''
        uses: actions/upload-artifact@v4
        with:
          name: nixbrowser-release-${{ github.run_number }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
