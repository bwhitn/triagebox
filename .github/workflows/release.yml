name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 360

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Ensure sbin directories are on PATH
        run: |
          echo /usr/local/sbin >> "${GITHUB_PATH}"
          echo /usr/sbin >> "${GITHUB_PATH}"
          echo /sbin >> "${GITHUB_PATH}"

      - name: Ensure Rust wasm target
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup default stable
            rustup target add wasm32-unknown-unknown
          else
            echo "rustup not found; install the wasm32-unknown-unknown target manually on the runner" >&2
            exit 1
          fi

      - name: Ensure filesystem build tools
        run: |
          export PATH="/usr/local/sbin:/usr/sbin:/sbin:${PATH}"
          find_tool() {
            local cmd="$1"
            local candidate
            for candidate in \
              "/usr/local/sbin/${cmd}" \
              "/usr/sbin/${cmd}" \
              "/sbin/${cmd}" \
              "/usr/bin/${cmd}" \
              "/bin/${cmd}"
            do
              if [ -x "${candidate}" ]; then
                printf '%s\n' "${candidate}"
                return 0
              fi
            done
            return 1
          }
          missing=0
          for cmd in e2fsck mke2fs resize2fs mkfs.erofs; do
            if ! find_tool "${cmd}" >/dev/null 2>&1; then
              missing=1
              break
            fi
          done
          if [ "${missing}" -eq 0 ]; then
            exit 0
          fi
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "Missing filesystem tools and apt-get is unavailable; install e2fsprogs and erofs-utils manually on the runner" >&2
            echo "PATH=${PATH}" >&2
            ls -l /usr/local/sbin/e2fsck /usr/sbin/e2fsck /sbin/e2fsck 2>/dev/null || true
            ls -l /usr/local/sbin/mke2fs /usr/sbin/mke2fs /sbin/mke2fs 2>/dev/null || true
            ls -l /usr/local/sbin/resize2fs /usr/sbin/resize2fs /sbin/resize2fs 2>/dev/null || true
            ls -l /usr/local/sbin/mkfs.erofs /usr/sbin/mkfs.erofs /sbin/mkfs.erofs /usr/bin/mkfs.erofs /bin/mkfs.erofs 2>/dev/null || true
            exit 1
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y e2fsprogs erofs-utils
          elif [ "$(id -u)" = "0" ]; then
            apt-get update
            apt-get install -y e2fsprogs erofs-utils
          else
            echo "Missing filesystem tools and neither sudo nor root privileges are available; install e2fsprogs and erofs-utils manually on the runner" >&2
            echo "PATH=${PATH}" >&2
            ls -l /usr/local/sbin/e2fsck /usr/sbin/e2fsck /sbin/e2fsck 2>/dev/null || true
            ls -l /usr/local/sbin/mke2fs /usr/sbin/mke2fs /sbin/mke2fs 2>/dev/null || true
            ls -l /usr/local/sbin/resize2fs /usr/sbin/resize2fs /sbin/resize2fs 2>/dev/null || true
            ls -l /usr/local/sbin/mkfs.erofs /usr/sbin/mkfs.erofs /sbin/mkfs.erofs /usr/bin/mkfs.erofs /bin/mkfs.erofs 2>/dev/null || true
            exit 1
          fi

      - name: Verify tag matches VERSION
        if: github.event_name == 'push'
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
            echo "Tag/version mismatch: VERSION=${VERSION}, tag=${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Check runner dependencies
        env:
          CHECK_V86_MIN: "1"
        run: ./scripts/check-build-deps.sh

      - name: Build release bundle
        env:
          EXPECTED_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
          BUILDROOT_CCACHE: "0"
          ROOTFS_FS: "erofs"
          EROFS_COMPRESSION: "lz4"
        run: ./scripts/package-release.sh

      - name: Upload release bundle artifact
        if: always() && hashFiles('dist/*.tar.gz', 'dist/*.tar.gz.sha256') != ''
        uses: actions/upload-artifact@v4
        with:
          name: triagebox-release-${{ github.run_number }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
