<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>TriageBox Embed Harness</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Iosevka", "JetBrains Mono", "SFMono-Regular", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: #f2f4f7;
        color: #121417;
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        display: grid;
        gap: 0.85rem;
      }

      .panel {
        background: #fff;
        border: 1px solid #d9dee5;
        border-radius: 10px;
        padding: 0.75rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        align-items: center;
      }

      .controls label {
        font-size: 0.9rem;
      }

      .controls input,
      .controls select,
      .controls button {
        font: inherit;
        padding: 0.35rem 0.5rem;
      }

      .controls input {
        min-width: 220px;
      }

      .status {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }

      #tb-frame {
        width: 100%;
        height: 72vh;
        border: 1px solid #252c36;
        border-radius: 8px;
        background: #000;
      }

      #log {
        margin: 0;
        white-space: pre-wrap;
        overflow: auto;
        max-height: 240px;
        background: #0f1115;
        color: #d6e1ed;
        border-radius: 8px;
        padding: 0.6rem;
        border: 1px solid #252c36;
        font-size: 0.85rem;
      }

      @media (max-width: 900px) {
        #tb-frame {
          height: 62vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>TriageBox Host Embed Harness</h1>
        <div class="controls">
          <label for="layout">Layout</label>
          <select id="layout">
            <option value="serial" selected>serial</option>
            <option value="vga">vga</option>
            <option value="both">both</option>
          </select>
          <label for="src">Inject src</label>
          <input id="src" type="text" value="/build-config.js">
          <label for="dst">Inject dst</label>
          <input id="dst" type="text" value="/root/sample.bin">
          <label for="mode">Inject mode</label>
          <select id="mode">
            <option value="runtime" selected>runtime</option>
            <option value="stage">stage</option>
          </select>
        </div>
        <div class="controls" style="margin-top:0.55rem;">
          <button id="reload">Reload iframe</button>
          <button id="run-flow">Run Flow</button>
          <button id="start">start</button>
          <button id="stop">stop</button>
          <button id="inject">inject</button>
          <button id="list-root">list_root</button>
          <button id="read-root">read_root</button>
          <button id="download-root">download_root</button>
          <button id="clear-log">Clear Log</button>
        </div>
        <p class="status" id="status">status: initializing</p>
      </section>

      <section class="panel">
        <iframe id="tb-frame" title="Embedded TriageBox"></iframe>
      </section>

      <section class="panel">
        <h2>Event / Command Log</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="triagebox-embed-sdk.js"></script>
    <script src="embed-harness.js"></script>
  </body>
</html>
